<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tasks</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    padding: 16px;
    font-size: 14px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .header h1 { font-size: 17px; font-weight: 600; }
  .count-badge { font-size: 12px; color: #9ca3af; font-weight: 400; }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.82; }
  .btn-primary { background: #2563eb; color: white; }
  .btn-ghost { background: #e5e7eb; color: #374151; }
  .btn-sm { padding: 4px 8px; font-size: 12px; }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid #d1d5db;
    background: white;
    font-size: 12px;
    cursor: pointer;
    color: #6b7280;
    transition: all 0.15s;
  }
  .filter-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

  .add-form {
    background: white;
    border-radius: 8px;
    padding: 14px;
    border: 1px solid #2563eb;
    margin-bottom: 10px;
    display: none;
  }
  .add-form.visible { display: block; }
  .add-form input {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 8px;
    outline: none;
  }
  .add-form input:focus { border-color: #2563eb; }
  .add-form-actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }

  .task-list { display: flex; flex-direction: column; gap: 7px; }
  .task-card {
    background: white;
    border-radius: 8px;
    padding: 11px 13px;
    border: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .task-card:hover { border-color: #c7d2fe; }
  .task-card.completed { opacity: 0.55; background: #f9fafb; }

  .task-main { flex: 1; min-width: 0; }
  .task-subject {
    font-weight: 500;
    font-size: 13.5px;
    line-height: 1.4;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-subject.completed { text-decoration: line-through; color: #9ca3af; }
  .task-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

  .status-badge {
    font-size: 10.5px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .status-pending { background: #e5e7eb; color: #6b7280; }
  .status-in_progress { background: #fef3c7; color: #b45309; }
  .status-completed { background: #d1fae5; color: #047857; }

  .tag { font-size: 12px; color: #6b7280; }

  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .action-btn {
    padding: 4px 9px;
    border-radius: 5px;
    border: 1px solid #e5e7eb;
    background: white;
    cursor: pointer;
    font-size: 12px;
    color: #374151;
    transition: background 0.12s;
    white-space: nowrap;
  }
  .action-btn:hover { background: #f3f4f6; }
  .action-btn.go { color: #2563eb; border-color: #bfdbfe; }
  .action-btn.go:hover { background: #eff6ff; }
  .action-btn.done { color: #059669; border-color: #a7f3d0; }
  .action-btn.done:hover { background: #f0fdf4; }
  .action-btn.del { color: #dc2626; border-color: #fecaca; }
  .action-btn.del:hover { background: #fef2f2; }

  .empty, .loading {
    text-align: center;
    color: #9ca3af;
    padding: 36px 0;
    font-size: 13px;
  }
  .error-msg { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>My Tasks <span class="count-badge" id="countBadge"></span></h1>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="loadTasks()">↻</button>
    <button class="btn btn-primary" onclick="toggleAddForm()">+ New Task</button>
  </div>
</div>

<div class="add-form" id="addForm">
  <input type="text" id="newSubject" placeholder="What needs to be done?" />
  <input type="text" id="newTags" placeholder="Tags (comma-separated, e.g. urgent, sandrina)" />
  <div class="add-form-actions">
    <button class="btn btn-ghost btn-sm" onclick="toggleAddForm()">Cancel</button>
    <button class="btn btn-primary btn-sm" onclick="createTask()">Add</button>
  </div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
  <button class="filter-btn" onclick="setFilter('in_progress', this)">In Progress</button>
  <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
</div>

<div id="taskList" class="task-list">
  <div class="loading">Loading tasks…</div>
</div>

<script>
let tasks = [];
let tagIcons = {};
let currentFilter = 'all';

function parse(raw) {
  if (!raw) return {};
  if (raw.structuredContent) return raw.structuredContent;
  if (raw.content && raw.content[0] && raw.content[0].text) {
    try { return JSON.parse(raw.content[0].text); } catch(e) {}
  }
  if (typeof raw === 'string') { try { return JSON.parse(raw); } catch(e) { return {}; } }
  return raw;
}

async function init() {
  try {
    const raw = await window.cowork.callMcpTool('mcp__tasks__tag_list', {});
    tagIcons = parse(raw) || {};
  } catch (e) {}
  await loadTasks();
}

async function loadTasks(silent = false) {
  if (!silent) document.getElementById('taskList').innerHTML = '<div class="loading">Loading…</div>';
  try {
    const raw = await window.cowork.callMcpTool('mcp__tasks__task_list', {});
    const result = parse(raw);
    const incoming = result.tasks || [];
    const changed = JSON.stringify(incoming) !== JSON.stringify(tasks);
    tasks = incoming;
    if (changed || !silent) renderTasks();
  } catch (e) {
    if (!silent) document.getElementById('taskList').innerHTML = '<div class="empty">Could not load tasks.</div>';
  }
}

function renderTasks() {
  const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.status === currentFilter);
  const active = tasks.filter(t => t.status !== 'completed').length;
  document.getElementById('countBadge').textContent = active > 0 ? `(${active} open)` : '';
  const container = document.getElementById('taskList');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Nothing here.</div>';
    return;
  }

  container.innerHTML = filtered.map(task => {
    const done = task.status === 'completed';
    const inProg = task.status === 'in_progress';
    const pending = task.status === 'pending';
    const tags = (task.tags || []).map(t => {
      const icon = tagIcons[t] || '🏷';
      return `<span class="tag">${icon} ${t}</span>`;
    }).join('');

    const actions = [];
    if (pending) actions.push(`<button class="action-btn go" onclick="setStatus(${task.id},'in_progress')">▶ Start</button>`);
    if (pending || inProg) actions.push(`<button class="action-btn done" onclick="setStatus(${task.id},'completed')">✓ Done</button>`);
    if (done) actions.push(`<button class="action-btn" onclick="setStatus(${task.id},'pending')">↺ Reopen</button>`);
    actions.push(`<button class="action-btn del" onclick="removeTask(${task.id})">✕</button>`);

    return `
      <div class="task-card ${done ? 'completed' : ''}" id="card-${task.id}">
        <div class="task-main">
          <div class="task-subject ${done ? 'completed' : ''}">#${task.id} ${escHtml(task.subject)}</div>
          <div class="task-meta">
            <span class="status-badge status-${task.status}">${task.status.replace('_',' ')}</span>
            ${tags}
          </div>
        </div>
        <div class="task-actions">${actions.join('')}</div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

async function setStatus(id, status) {
  try {
    await window.cowork.callMcpTool('mcp__tasks__task_update', { id, status });
    const t = tasks.find(x => x.id === id);
    if (t) t.status = status;
    renderTasks();
  } catch (e) { alert('Failed to update task.'); }
}

async function removeTask(id) {
  try {
    await window.cowork.callMcpTool('mcp__tasks__task_delete', { id });
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
  } catch (e) { alert('Failed to remove task.'); }
}

function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('visible');
  if (f.classList.contains('visible')) document.getElementById('newSubject').focus();
  else { document.getElementById('newSubject').value = ''; document.getElementById('newTags').value = ''; }
}

async function createTask() {
  const subject = document.getElementById('newSubject').value.trim();
  if (!subject) return;
  const raw = document.getElementById('newTags').value.trim();
  const tags = raw ? raw.split(',').map(t => t.trim()).filter(Boolean) : null;
  try {
    const res = await window.cowork.callMcpTool('mcp__tasks__task_create', { subject, tags });
    const task = parse(res);
    tasks.unshift(task);
    toggleAddForm();
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    renderTasks();
  } catch (e) { alert('Failed to create task.'); }
}

document.addEventListener('keydown', e => {
  const form = document.getElementById('addForm');
  if (e.key === 'Enter' && form.classList.contains('visible')) createTask();
  if (e.key === 'Escape' && form.classList.contains('visible')) toggleAddForm();
});

function waitForCowork(cb, tries = 0) {
  if (window.cowork && typeof window.cowork.callMcpTool === 'function') {
    cb();
  } else if (tries < 30) {
    setTimeout(() => waitForCowork(cb, tries + 1), 300);
  } else {
    document.getElementById('taskList').innerHTML = '<div class="empty">Could not connect to task store.</div>';
  }
}

waitForCowork(() => {
  init();
  setInterval(() => loadTasks(true), 10000);
});
</script>
</body>
</html>
